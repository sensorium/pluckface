name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        aubio_mode: [system, vendored]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config lv2-dev

      - name: Install system aubio dependency
        if: matrix.aubio_mode == 'system'
        run: sudo apt-get install -y libaubio-dev

      - name: Build
        run: |
          make clean
          make AUBIO_MODE=${{ matrix.aubio_mode }} CFLAGS='-Wall -Wextra -Wpedantic -O0'
