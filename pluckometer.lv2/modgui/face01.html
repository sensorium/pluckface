<!DOCTYPE html>
<html>
<head>
    <title>Interactive Face</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #f0f0f0; }
        .controls { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; margin: 10px 0; font-weight: bold; }
        svg { background: white; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="controls">
        <label>Look Left/Right: <input type="range" id="eyeX" min="-8" max="8" value="0"></label>
        <label>Look Up/Down: <input type="range" id="eyeY" min="-5" max="5" value="0"></label>
        <label>Smile Intensity: <input type="range" id="smile" min="0" max="30" value="0"></label>
	<button onclick="captureAnimation()">Capture Frames</button>
	<div id="output"></div> <!-- This is where the images will appear -->
    </div>

    <svg viewBox="0 0 200 200" width="300" height="300">
        <!-- Head -->
        <circle cx="100" cy="100" r="80" fill="#FFD966" stroke="#333" stroke-width="3"/>
        <!-- Eyes -->
        <circle cx="70" cy="80" r="15" fill="white"  />
        <circle cx="130" cy="80" r="15" fill="white"  />
        <!-- Pupils -->
        <circle id="pupilL" cx="70" cy="80" r="6" fill="#333" />
        <circle id="pupilR" cx="130" cy="80" r="6" fill="#333" />
        <!-- Mouth -->
        <path id="mouth" d="M 70 130 Q 100 130 130 130" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/>
    </svg>

    <script>
        const eyeX = document.getElementById('eyeX');
        const eyeY = document.getElementById('eyeY');
        const smile = document.getElementById('smile');
        const pupilL = document.getElementById('pupilL');
        const pupilR = document.getElementById('pupilR');
        const mouth = document.getElementById('mouth');

        function update() {
            // Update Eyes
            let x = parseFloat(eyeX.value);
            let y = parseFloat(eyeY.value);
            pupilL.setAttribute('cx', 70 + x);
            pupilL.setAttribute('cy', 80 + y);
            pupilR.setAttribute('cx', 130 + x);
            pupilR.setAttribute('cy', 80 + y);

            // Update Mouth
            // The "130" is the baseline Y coordinate. 
            // We add the smile value to the middle point of the curve.
            let s = 130 + parseFloat(smile.value);
            mouth.setAttribute('d', `M 70 130 Q 100 ${s} 130 130`);
        }

async function createSheet(type) {
    const svgElement = document.querySelector('svg');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    // CONFIGURATION PER TYPE
    let config = {
        eye:   { sx: 50, sy: 60, sw: 40, sh: 40, frames: 10, slider: eyeX, min: -8, max: 8 },
        mouth: { sx: 60, sy: 110, sw: 80, sh: 60, frames: 15, slider: smile, min: 0, max: 30 }
    }[type];

    canvas.width = config.sw * config.frames;
    canvas.height = config.sh;

    for (let i = 0; i < config.frames; i++) {
        // Calculate slider value based on current frame
        const val = config.min + (i / (config.frames - 1)) * (config.max - config.min);
        config.slider.value = val;
        update(); // Refresh SVG

        // Capture SVG to Image
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);
        const img = new Image();

        await new Promise((resolve) => {
            img.onload = () => {
                // Draw only the cropped area into the sprite strip
                ctx.drawImage(
                    img, 
                    config.sx, config.sy, config.sw, config.sh, // Source (Crop)
                    i * config.sw, 0, config.sw, config.sh      // Destination (Strip)
                );
                URL.revokeObjectURL(url);
                resolve();
            };
            img.src = url;
        });
        await new Promise(r => setTimeout(r, 50));
    }

    // Download the result
    const link = document.createElement('a');
    link.download = `${type}-spritesheet.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
}

        eyeX.addEventListener('input', update);
        eyeY.addEventListener('input', update);
        smile.addEventListener('input', update);
    </script>
</body>
</html>
